name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  REQUIRED_UV_VERSION: "0.11.26"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.REQUIRED_UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Verify uv.lock is in sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run Ruff check
        run: uv run --frozen ruff check .

      - name: Run Ruff format check
        run: uv run --frozen ruff format --check .

      - name: Run Mypy
        run: uv run --frozen mypy app worker

      - name: Run tests
        timeout-minutes: 2
        run: uv run --frozen pytest -v --tb=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  browser-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci --prefix browser-extension

      - name: Lint extension
        run: npm --prefix browser-extension run lint

      - name: Check extension version consistency
        run: npm --prefix browser-extension run check:version

      - name: Build extension
        run: npm --prefix browser-extension run build

      - name: Package extension
        run: npm --prefix browser-extension run package
