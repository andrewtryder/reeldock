name: CodeQL

# Static analysis of the application (Python) and the browser extension
# (JavaScript/TypeScript). Runs on PRs to main, pushes to main, and weekly to
# catch newly published queries. Scorecard's SARIF upload and Dependency
# Review live in their own workflows and are intentionally not duplicated here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 08:00 UTC.
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          category: "/language:${{ matrix.language }}"
