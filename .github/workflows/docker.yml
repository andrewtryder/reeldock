name: Docker Publish

# Tagging behavior by trigger:
#   • CI success on `main` / manual dispatch  → GHCR + optional Docker Hub:
#     tags = `main`, `latest`, `sha-<short>` (no semver).
#   • Tag push `v*.*.*` (e.g. from Release Please) → GHCR + optional Docker Hub:
#     tags = `<version>`, `<major>.<minor>`, `sha-<short>`.
#
# Docker Hub publishing is optional: if either `DOCKERHUB_USERNAME` or
# `DOCKERHUB_TOKEN` is missing the workflow still publishes to GHCR using the
# repository `GITHUB_TOKEN`.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_branch || github.ref_name || github.sha }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # For CI-triggered runs, check out the commit that CI validated.
          # Tag pushes and manual dispatches use the default ref.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub publishing is opt-in. Compare secret presence without
      # echoing values back to logs.
      - name: Detect Docker Hub credentials
        id: dockerhub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "image=$DH_USER/reeldock" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Branch/dispatch metadata: main + latest + short SHA. Only emitted on
      # workflow_run/dispatch, never on tag pushes (tag pushes get their own
      # semver-only metadata step below).
      - name: Extract branch metadata
        id: meta_branch
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ steps.dockerhub.outputs.image }}
          tags: |
            type=raw,value=main
            type=raw,value=latest
            type=sha,format=short

      # Tag-push metadata: semantic version tags only. Runs only for tag events
      # so `type=semver` always has a valid semver ref to derive from.
      - name: Extract tag metadata
        id: meta_tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ steps.dockerhub.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      # On release tag pushes, the same commit was usually already published by
      # the main-branch workflow_run as `sha-<short>`. Retag that multi-arch
      # manifest with semver tags instead of rebuilding from scratch.
      - name: Compute commit short SHA
        if: startsWith(github.ref, 'refs/tags/v')
        id: commit_sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check for existing commit image
        if: startsWith(github.ref, 'refs/tags/v')
        id: existing
        run: |
          if docker buildx imagetools inspect "${{ env.GHCR_IMAGE }}:sha-${{ steps.commit_sha.outputs.short }}" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag existing image for release (skip rebuild)
        if: startsWith(github.ref, 'refs/tags/v') && steps.existing.outputs.found == 'true'
        run: |
          source="${{ env.GHCR_IMAGE }}:sha-${{ steps.commit_sha.outputs.short }}"
          args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && args+=(--tag "$tag")
          done <<< "${{ steps.meta_tag.outputs.tags }}"
          docker buildx imagetools create "${args[@]}" "$source"

      - name: Build and push Docker image
        if: "!(startsWith(github.ref, 'refs/tags/v') && steps.existing.outputs.found == 'true')"
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_branch.outputs.tags || steps.meta_tag.outputs.tags }}
          labels: ${{ steps.meta_branch.outputs.labels || steps.meta_tag.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
