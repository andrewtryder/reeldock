name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout repository
        if: ${{ steps.release.outputs['browser-extension--release_created'] == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ steps.release.outputs['browser-extension--release_created'] == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build extension artifacts
        if: ${{ steps.release.outputs['browser-extension--release_created'] == 'true' }}
        run: |
          npm install --prefix browser-extension
          npm --prefix browser-extension run package

      - name: Upload extension artifacts to release
        if: ${{ steps.release.outputs['browser-extension--release_created'] == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXT_VERSION: ${{ steps.release.outputs['browser-extension--version'] }}
          EXT_TAG: ${{ steps.release.outputs['browser-extension--tag_name'] }}
        run: |
          gh release upload "$EXT_TAG" \
            "browser-extension/artifacts/yt-abs-importer-chrome-v$EXT_VERSION.zip" \
            "browser-extension/artifacts/yt-abs-importer-firefox-v$EXT_VERSION.zip" \
            --clobber
