name: Validate Proxmox Installer

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/proxmox/**'
      - '.github/workflows/validate-proxmox.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/proxmox/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Lint Shell Scripts
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'scripts/proxmox'

      # 2. Validate Cloud-Init Schema
      - name: Install cloud-init validator
        run: |
          sudo apt-get update
          sudo apt-get install -y cloud-init
      
      - name: Validate Cloud-Init Schema
        run: |
          cloud-init schema --validate --config scripts/proxmox/cloud-init-user-data.yml

      # 3. Dry-run Host Installer with Mocked PVE commands
      - name: Test Installer Argument Parsing (Dry Run)
        run: |
          # Create fake mock environment for PVE commands
          mkdir -p /tmp/mock-pve-bin
          
          cat << 'EOF' > /tmp/mock-pve-bin/pveversion
          #!/bin/sh
          echo "pve-manager/8.1.4/168553d6 (running kernel: 6.5.11-8-pve)"
          EOF
          
          cat << 'EOF' > /tmp/mock-pve-bin/pvesm
          #!/bin/sh
          # Return status containing "active"
          echo "local dir 1 99999999 0 99999999 100% active"
          EOF

          cat << 'EOF' > /tmp/mock-pve-bin/qm
          #!/bin/sh
          # Return non-zero for status check so it knows VMID is unused
          if [ "$1" = "status" ]; then
            exit 1
          fi
          exit 0
          EOF

          cat << 'EOF' > /tmp/mock-pve-bin/pvesh
          #!/bin/sh
          echo "100"
          EOF

          chmod +x /tmp/mock-pve-bin/*
          export PATH="/tmp/mock-pve-bin:$PATH"

          # Mock directories and files to bypass downloads/checks
          sudo mkdir -p /etc/pve
          sudo mkdir -p /var/lib/vz/snippets
          sudo mkdir -p /var/lib/vz/template/qemu
          sudo touch /var/lib/vz/template/qemu/debian-12-genericcloud-amd64.qcow2

          # Run host installer using loopback bridge (always active) and disable start
          sudo -E ./scripts/proxmox/proxmox-install.sh \
            --mode native-vm \
            --vmid 999 \
            --hostname test-yt-abs \
            --storage local \
            --bridge lo \
            --cores 1 \
            --memory 512 \
            --disk 10G \
            --start false
