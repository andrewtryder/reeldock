name: Validate Proxmox Installer

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/proxmox/**'
      - '.github/workflows/validate-proxmox.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/proxmox/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # 1. Lint Shell Scripts
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'scripts/proxmox'

      # 2. Validate Cloud-Init Schema
      - name: Install cloud-init validator
        run: |
          sudo apt-get update
          sudo apt-get install -y cloud-init

      - name: Validate Cloud-Init Schema
        run: |
          cloud-init schema -c scripts/proxmox/cloud-init-user-data.yml
