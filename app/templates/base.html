<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}yt-abs-importer{% endblock %}</title>
  <meta name="description" content="YouTube to Audiobookshelf importer — convert YouTube videos to M4B audiobooks" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <svg class="logo-icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
        <span class="logo-text">yt<span class="logo-accent">-abs-</span>importer</span>
      </a>
      <nav class="site-nav">
        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Import</a>
        <a href="/jobs" class="nav-link {% if request.url.path.startswith('/jobs') %}active{% endif %}">Jobs</a>
        <a href="/settings" class="nav-link {% if request.url.path.startswith('/settings') %}active{% endif %}">Settings</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>yt-abs-importer &copy; 2026</span>
    {% if settings.dry_run %}
    <span class="badge badge-warning">DRY RUN</span>
    {% endif %}
  </footer>
</body>
</html>
