<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-labelledby="title desc">
  <title id="title">abs-media-importer logo concept 2 dark mode</title>
  <desc id="desc">A compact app logo showing a YouTube play tile imported into an audiobook shelf, with an m4b output badge and wordmark, optimized for dark GitHub backgrounds.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="48" x2="514" y2="532" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18263F"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="pageLeft" x1="145" y1="273" x2="287" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7E6"/>
      <stop offset="1" stop-color="#F0D9AA"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="459" y1="273" x2="313" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3D1"/>
      <stop offset="1" stop-color="#EACB8D"/>
    </linearGradient>
    <linearGradient id="teal" x1="193" y1="192" x2="439" y2="482" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#50E3C2"/>
      <stop offset="1" stop-color="#15AABF"/>
    </linearGradient>
    <linearGradient id="red" x1="167" y1="90" x2="435" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3B3B"/>
      <stop offset="1" stop-color="#C91525"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <filter id="tightShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="56" y="40" width="500" height="500" rx="118"/>
    </clipPath>
    <style>
      .wordmark { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <!-- Icon container -->
  <g filter="url(#softShadow)">
    <rect x="56" y="40" width="500" height="500" rx="118" fill="url(#bg)"/>
    <rect x="73" y="57" width="466" height="466" rx="101" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
  </g>

  <g clip-path="url(#iconClip)">
    <!-- Ambient arcs -->
    <circle cx="506" cy="58" r="270" fill="#2DD4BF" opacity="0.09"/>
    <circle cx="93" cy="520" r="240" fill="#EF4444" opacity="0.11"/>
    <path d="M87 415 C178 350 256 347 318 389 C390 438 465 414 540 333" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="28" stroke-linecap="round"/>

    <!-- YouTube source tile -->
    <g filter="url(#tightShadow)">
      <rect x="156" y="88" width="296" height="152" rx="48" fill="url(#red)"/>
      <path d="M279 132 L279 196 L343 164 Z" fill="#FFFFFF"/>
      <rect x="178" y="110" width="252" height="108" rx="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="3"/>
    </g>

    <!-- Import arrow -->
    <path d="M305 249 C305 294 305 305 305 332" fill="none" stroke="url(#teal)" stroke-width="20" stroke-linecap="round"/>
    <path d="M266 312 L305 357 L344 312" fill="none" stroke="url(#teal)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Open audiobook -->
    <g filter="url(#tightShadow)">
      <path d="M112 319 C167 288 231 288 292 324 L292 468 C234 433 171 424 112 452 Z" fill="url(#pageLeft)"/>
      <path d="M500 319 C445 288 381 288 320 324 L320 468 C378 433 441 424 500 452 Z" fill="url(#pageRight)"/>
      <path d="M292 324 C301 318 311 318 320 324 L320 468 C310 462 301 462 292 468 Z" fill="#D6A854"/>
      <path d="M132 347 C180 326 229 327 274 352" fill="none" stroke="#9C6A2C" stroke-opacity="0.22" stroke-width="8" stroke-linecap="round"/>
      <path d="M338 352 C383 327 432 326 480 347" fill="none" stroke="#9C6A2C" stroke-opacity="0.22" stroke-width="8" stroke-linecap="round"/>
      <path d="M135 386 C181 369 226 371 270 394" fill="none" stroke="#9C6A2C" stroke-opacity="0.18" stroke-width="7" stroke-linecap="round"/>
      <path d="M342 394 C386 371 431 369 477 386" fill="none" stroke="#9C6A2C" stroke-opacity="0.18" stroke-width="7" stroke-linecap="round"/>
    </g>

    <!-- Shelf / output rail -->
    <path d="M106 474 H508" stroke="#50E3C2" stroke-width="18" stroke-linecap="round" opacity="0.82"/>
    <path d="M154 504 H458" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="8" stroke-linecap="round"/>

    <!-- M4B badge -->
    <g filter="url(#tightShadow)">
      <rect x="370" y="396" width="114" height="54" rx="20" fill="#07111F" stroke="#50E3C2" stroke-opacity="0.85" stroke-width="3"/>
      <text x="427" y="431" text-anchor="middle" class="wordmark" font-size="25" font-weight="800" fill="#D7FFF7" letter-spacing="0.5">M4B</text>
    </g>

    <!-- Audio waveform dots -->
    <g fill="#D7FFF7" opacity="0.9">
      <rect x="153" y="432" width="10" height="30" rx="5"/>
      <rect x="174" y="419" width="10" height="43" rx="5"/>
      <rect x="195" y="407" width="10" height="55" rx="5"/>
      <rect x="216" y="423" width="10" height="39" rx="5"/>
      <rect x="237" y="414" width="10" height="48" rx="5"/>
    </g>
  </g>

  <!-- Wordmark lockup optimized for dark background -->
  <g class="wordmark">
    <text x="648" y="228" font-size="108" font-weight="850" fill="#E6EDF3" letter-spacing="-4">yt-abs</text>
    <text x="648" y="334" font-size="104" font-weight="780" fill="#22D3EE" letter-spacing="-4">importer</text>
    <path d="M654 378 H1132" stroke="#8B949E" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(648 420)">
      <rect x="0" y="0" width="76" height="48" rx="18" fill="#FEE2E2"/>
      <path d="M30 14 L30 34 L50 24 Z" fill="#DC2626"/>
      <path d="M107 24 H196" stroke="#94A3B8" stroke-width="10" stroke-linecap="round"/>
      <path d="M170 0 L202 24 L170 48" fill="none" stroke="#94A3B8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="236" y="0" width="64" height="48" rx="12" fill="#E0F2FE"/>
      <path d="M248 12 H288 M248 24 H288 M248 36 H280" stroke="#0284C7" stroke-width="6" stroke-linecap="round"/>
      <text x="330" y="33" font-size="34" font-weight="750" fill="#C9D1D9" letter-spacing="-0.5">YouTube to Audiobookshelf</text>
    </g>
  </g>
</svg>
