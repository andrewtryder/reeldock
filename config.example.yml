# ============================================================
# config.example.yml — yt-abs-importer
# ============================================================
#
# Custom YAML configuration file. Environment variables will take
# precedence over these values if both are defined.
#
# ── Mappings for User Placeholders ──────────────────────────
#   - AUDIOBOOKSHELF_IMPORT_DIR  => paths.output_root
#   - DOWNLOAD_DIR               => paths.work_dir
#   - TEMP_DIR                   => paths.work_dir
#   - METADATA_DIR               => parent directory of paths.archive_file (or app.db directory)
#   - COOKIES_FILE               => configured inside download.yt_dlp_extra_args
#   - UID/GID                    => set via environment variables (PUID/PGID) in Docker
# ────────────────────────────────────────────────────────────

app:
  host: "0.0.0.0"
  port: 8080
  base_url: ~ # e.g. "http://yt-abs.local:8080"
  secret_key: "change-me-to-a-random-secret"
  auth_enabled: false
  auth_username: "admin"
  auth_password: "changeme"

paths:
  # DOWNLOAD_DIR / TEMP_DIR placeholder mapping:
  work_dir: "/data/work"
  
  # METADATA_DIR placeholder mappings (youtube-archive.txt):
  archive_file: "/data/config/youtube-archive.txt"
  
  # AUDIOBOOKSHELF_IMPORT_DIR placeholder mapping:
  output_root: "/media/podcasts"

download:
  allow_playlists: false
  allow_channels: false
  default_destination_folder: ~
  audio_format: "m4a"
  audio_quality: ~
  
  # COOKIES_FILE placeholder mapping:
  # To supply a cookies file, uncomment and specify --cookies argument:
  # yt_dlp_extra_args: "--cookies /data/config/cookies.txt"
  yt_dlp_extra_args: ""
  
  ffmpeg_extra_args: ""
  output_extension: "m4b"
  filename_template: "{title}.m4b"
  folder_name_field: "uploader_id"
  folder_name_fallbacks: "uploader_id,channel_id,channel,uploader"
  collision_mode: "append_id"  # skip | overwrite | append_id | append_counter

jobs:
  max_concurrent_jobs: 1
  timeout_seconds: 10800
  retry_max: 3
  retry_intervals_seconds: [60, 300, 900]
  cleanup_temp_on_success: true
  cleanup_temp_on_failure: false

audiobookshelf:
  base_url: "http://audiobookshelf:13378"
  api_token: "your-abs-api-token"
  library_id: "your-library-id"
  scan_after_success: false
