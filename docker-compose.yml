# ============================================================
# docker-compose.yml — yt-abs-importer
# ============================================================
#
# Three services:
#   app     — FastAPI web server
#   worker  — RQ background worker
#   redis   — Task queue
#
# Volume layout is driven by these environment variables:
#   HOST_PODCASTS_DIR       → Path on the Docker host (e.g. /mnt/podcasts or /Volumes/Synology/Media/Podcasts)
#   CONTAINER_PODCASTS_DIR  → Path inside the containers (default: /media/podcasts, usually do not change)
#   OUTPUT_ROOT             → Path where the application writes podcasts (should match CONTAINER_PODCASTS_DIR)
#
# Other mounted volumes:
#   ./data    → /data       (SQLite database, work/download files, logs)
#   ./config  → /config     (Optional YAML configuration)
#
# ── NFS note ──────────────────────────────────────────────────────────────────
# Recommended: Mount your network/NFS share on the Docker HOST machine first,
# then bind-mount it here via HOST_PODCASTS_DIR. This avoids Docker NFS driver quirks.
#
#   /etc/fstab example (Proxmox/Linux host):
#     nas.local:/volume1/podcasts  /mnt/podcasts  nfs  defaults,_netdev,nofail  0  0
# ──────────────────────────────────────────────────────────────────────────────

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-abs-importer:latest
    container_name: yt-abs-importer-app
    command: app
    restart: unless-stopped
    # By default, bind only to localhost for safety.
    # To expose the service to your LAN, change to "8080:8080", but make sure to enable HTTP Basic Auth first!
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/data
      - ${HOST_PODCASTS_DIR:-/mnt/podcasts}:${CONTAINER_PODCASTS_DIR:-/media/podcasts}
      - ./config:/config
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////data/app.db
      - OUTPUT_ROOT=${OUTPUT_ROOT:-/media/podcasts}
      - WORK_DIR=/data/work
      - ARCHIVE_FILE=/data/config/youtube-archive.txt
      # Optional: set PUID/PGID to match your NFS share user
      # - PUID=1000
      # - PGID=1000
      # Optional: Audiobookshelf integration
      # - ABS_BASE_URL=http://audiobookshelf:13378
      # - ABS_API_TOKEN=your-abs-api-token
      # - ABS_LIBRARY_ID=your-library-id
      # - ABS_SCAN_AFTER_SUCCESS=true
      # Optional: Enable basic auth
      # - AUTH_ENABLED=true
      # - AUTH_USERNAME=admin
      # - AUTH_PASSWORD=changeme
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fs", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-abs-importer:latest
    container_name: yt-abs-importer-worker
    command: worker
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ${HOST_PODCASTS_DIR:-/mnt/podcasts}:${CONTAINER_PODCASTS_DIR:-/media/podcasts}
      - ./config:/config
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////data/app.db
      - OUTPUT_ROOT=${OUTPUT_ROOT:-/media/podcasts}
      - WORK_DIR=/data/work
      - ARCHIVE_FILE=/data/config/youtube-archive.txt
      # - PUID=1000
      # - PGID=1000
      # - ABS_BASE_URL=http://audiobookshelf:13378
      # - ABS_API_TOKEN=your-abs-api-token
      # - ABS_LIBRARY_ID=your-library-id
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: yt-abs-importer-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
