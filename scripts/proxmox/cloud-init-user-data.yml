#cloud-config
# ============================================================
# cloud-init-user-data.yml — Template for VM guest setup
# ============================================================

# System package upgrades
package_update: true
package_upgrade: false

# Required base packages
packages:
  - git
  - curl
  - ca-certificates

# System user configuration
users:
  - name: debian
    gecos: Debian User
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: true

# Run commands at first boot
runcmd:
  # Clone the app repository
  - mkdir -p /opt
  - git clone https://github.com/andrewtryder/abs-media-importer.git /opt/abs-media-importer

  # Trigger mode-specific provisioning (Docker VM or Native VM)
  # NOTE: The installer script on the host will append the bootstrap command here.
